# Test Configuration for Ledgora Integration Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Override isolation — H2 does not support the same connection.isolation config as production
spring.jpa.properties.hibernate.connection.isolation=
# JWT secret must be explicitly set for tests (SecurityConfig @PostConstruct validates it)
app.jwt.secret=ledgora-test-only-secret-key-must-be-at-least-256-bits-long
app.jwt.expiration=86400000
# Disable scheduled jobs during tests (set to max long = effectively never)
ledgora.reconciliation.fixedRate=9999999999
ledgora.ledgervalidator.fixedRate=9999999999
# Re-enable seeder for tests — H2 starts empty and needs seed data
ledgora.seeder.enabled=true
logging.level.com.ledgora=DEBUG
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
