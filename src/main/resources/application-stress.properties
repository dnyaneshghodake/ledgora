# =============================================================================
# Ledgora CBS — Stress Test Profile
# =============================================================================
# Activate: mvn spring-boot:run -Dspring-boot.run.profiles=stress
# Or: java -jar ledgora.war --spring.profiles.active=stress
#
# Purpose: EOD performance stress testing with Hibernate statistics + metrics.
# =============================================================================

# H2 in-memory (same as default — stress runs in isolation)
spring.datasource.url=jdbc:h2:mem:ledgora_stress
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA: enable Hibernate statistics for performance measurement
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.format_sql=false

# HikariCP: pool sizing for stress
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Logging: suppress SQL noise, keep stress output visible
logging.level.com.ledgora=INFO
logging.level.com.ledgora.stress=DEBUG
logging.level.org.hibernate.stat=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Actuator metrics enabled for stress observation
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
