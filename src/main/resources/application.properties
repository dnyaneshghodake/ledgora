# Ledgora Core Banking Platform - Application Properties

# ─────────────────────────────────────────────────────────────────
# SERVER — port/context-path not used when deployed as WAR on Tomcat
# (Tomcat controls port and context path via server.xml / WAR name)
# ─────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ─────────────────────────────────────────────────────────────────
# SQL Server Database Configuration
# Override via environment variables or Tomcat context.xml for UAT/PROD.
# Required env vars:
#   DB_URL      e.g. jdbc:sqlserver://HOST:1433;databaseName=ledgora;encrypt=true;trustServerCertificate=false
#   DB_USERNAME e.g. ledgora_app
#   DB_PASSWORD (never commit the real value)
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ledgora;encrypt=false;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Connection pool (HikariCP defaults are good; tune for UAT load)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 console disabled — not used with SQL Server
spring.h2.console.enabled=false

# ─────────────────────────────────────────────────────────────────
# JPA / Hibernate — SQL Server
# IMPORTANT: ddl-auto=validate in UAT/PROD — never update/create-drop.
# Run the SQL migration scripts manually before deploying.
# ─────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
# CBS Isolation Strategy: READ_COMMITTED (JDBC level 2).
# SQL Server default is already READ_COMMITTED; this makes it explicit.
spring.jpa.properties.hibernate.connection.isolation=2

# ─────────────────────────────────────────────────────────────────
# JWT Configuration
# SECURITY: Override app.jwt.secret via JWT_SECRET environment variable.
# Set this in Tomcat's setenv.sh / setenv.bat or as a system property.
# Do NOT commit the real secret to source control.
# ─────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ledgora-dev-only-secret-key-must-be-at-least-256-bits-long}
app.jwt.expiration=86400000
# JWT Key Rotation: set previous-secret to the OLD key value when rotating.
# app.jwt.previous-secret=${JWT_PREVIOUS_SECRET:}

# Session timeout (RBI-F5: prevent indefinite sessions)
server.servlet.session.timeout=15m

# Logging
logging.level.com.ledgora=INFO
logging.level.org.springframework.security=WARN

# Static Resources
spring.web.resources.static-locations=classpath:/static/,/resources/

# PART 14: Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# SECURITY: Use 'when-authorized' instead of 'always' to prevent leaking
# database, disk, and component health details to unauthenticated users (CWE-200).
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=ledgora
