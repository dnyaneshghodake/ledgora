# Ledgora Core Banking Platform - Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# H2 Database Configuration (Development)
# SECURITY: H2 console is DISABLED by default.
# Enable only via application-dev.properties or -Dspring.h2.console.enabled=true locally.
spring.datasource.url=jdbc:h2:mem:ledgoradb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
# CBS Isolation Strategy: READ_COMMITTED (JDBC level 2) as global default.
# Prevents dirty reads while allowing high-concurrency posting.
# See docs/transaction-isolation-strategy.md for workload-specific rationale.
spring.jpa.properties.hibernate.connection.isolation=2

# JWT Configuration
# SECURITY: Override app.jwt.secret via environment variable or external config.
# Do NOT commit production secrets to source control (CWE-798).
app.jwt.secret=${JWT_SECRET:ledgora-dev-only-secret-key-must-be-at-least-256-bits-long}
app.jwt.expiration=86400000
# JWT Key Rotation: set previous-secret to the OLD key value when rotating.
# Tokens signed with the old key are accepted during the grace period (until they expire).
# After grace period (default 24h), remove this property.
# app.jwt.previous-secret=${JWT_PREVIOUS_SECRET:}

# Session timeout (RBI-F5: prevent indefinite sessions)
server.servlet.session.timeout=15m

# Logging
logging.level.com.ledgora=INFO
logging.level.org.springframework.security=WARN

# Static Resources
spring.web.resources.static-locations=classpath:/static/,/resources/

# PART 14: Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# SECURITY: Use 'when-authorized' instead of 'always' to prevent leaking
# database, disk, and component health details to unauthenticated users (CWE-200).
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=ledgora
