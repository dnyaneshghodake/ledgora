# Ledgora Core Banking Platform - Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# H2 Database Configuration (Development)
spring.datasource.url=jdbc:h2:mem:ledgoradb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=LedgoraCoreB4nk1ngPl4tf0rmS3cr3tK3yF0rJWTT0k3nG3n3r4t10n2026
app.jwt.expiration=86400000

# Logging
logging.level.com.ledgora=INFO
logging.level.org.springframework.security=WARN

# Static Resources
spring.web.resources.static-locations=classpath:/static/,/resources/

# PART 14: Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=ledgora
