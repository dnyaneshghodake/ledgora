# ============================================================================
# Ledgora CBS — SQL Server Profile
# Activate: -Dspring.profiles.active=sqlserver  (in Tomcat setenv.bat)
# ============================================================================

# Datasource — UAT defaults (override via env vars for other environments)
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ledgora;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sqlserver#123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false
# CBS Isolation: READ_COMMITTED (level 2)
spring.jpa.properties.hibernate.connection.isolation=2

# Connection pool (HikariCP defaults)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# Disable H2 console in production
spring.h2.console.enabled=false

# ─────────────────────────────────────────────────────────────────
# Seeder — DISABLED on UAT/PROD (real data already exists in DB)
# Run migration scripts manually before first deployment.
# ─────────────────────────────────────────────────────────────────
ledgora.seeder.enabled=false
