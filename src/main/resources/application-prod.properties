# Ledgora PROD Profile — activate via: -Dspring.profiles.active=prod
#
# All secrets MUST be injected via environment variables or external config.
# This file contains no secrets.

# SQL Server (override via env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# CRITICAL: validate-only in production — never auto-modify schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# H2 console MUST be disabled in production
spring.h2.console.enabled=false

# JWT secret MUST be injected — no fallback
app.jwt.secret=${JWT_SECRET}

# Tighter session timeout for production
server.servlet.session.timeout=10m
