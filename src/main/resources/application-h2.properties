# ============================================================================
# Ledgora CBS -- H2 In-Memory Profile for Local UI Testing
# Activate: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ============================================================================

# H2 In-Memory Database (file-based alternative: jdbc:h2:./ledgora-localdb)
spring.datasource.url=jdbc:h2:mem:ledgora;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate -- create-drop so tables are auto-created from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
# H2 does not support the same connection.isolation config as SQL Server
spring.jpa.properties.hibernate.connection.isolation=

# Enable H2 web console at http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:ledgora  |  User: sa  |  Password: (blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Seed reference data on startup -- H2 starts empty and needs seed data
ledgora.seeder.enabled=true

# JWT — reuses the default from application.properties (override via JWT_SECRET env var)
app.jwt.expiration=86400000

# Disable scheduled jobs to avoid noise during local testing
ledgora.reconciliation.fixedRate=9999999999
ledgora.ledgervalidator.fixedRate=9999999999

# Logging
logging.level.com.ledgora=DEBUG
logging.level.org.springframework.security=DEBUG
