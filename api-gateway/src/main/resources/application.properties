## Ledgora - Default Application Configuration
## Use profiles to switch between databases: sqlserver, mysql, h2

# ========== Active Profile ==========
# Options: sqlserver, mysql, h2
# Set via: --spring.profiles.active=sqlserver
spring.profiles.active=h2

# ========== Application Configuration ==========
spring.application.name=ledgora-api-gateway
spring.application.description=Ledgora - Core Banking Solutions Backend
server.port=8080
server.servlet.context-path=/api

# ========== Default Database Configuration (H2) ==========
spring.datasource.url=jdbc:h2:mem:ledgora_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== H2 Console ==========
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== JPA/Hibernate ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ========== Jackson Configuration ==========
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null

# ========== Logging Configuration ==========
logging.level.root=INFO
logging.level.com.ledgora=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ========== Session Configuration ==========
server.servlet.session.timeout=30m
spring.session.store-type=none

# ========== Actuator/Health Configuration ==========
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# ========== OpenAPI/Swagger Configuration ==========
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
