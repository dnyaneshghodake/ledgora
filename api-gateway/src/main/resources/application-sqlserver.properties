## SQL Server Configuration for Ledgora

# ========== SQL Server JDBC Connection ==========
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=LEDGORA;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=YourPassword@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========== JPA/Hibernate Configuration ==========
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ========== Connection Pool Configuration ==========
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========== Logging Configuration ==========
logging.level.root=INFO
logging.level.com.ledgora=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========== Jackson Configuration ==========
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null

# ========== Application Configuration ==========
spring.application.name=ledgora-api-gateway
server.port=8080
server.servlet.context-path=/api

# ========== Session Configuration ==========
server.servlet.session.timeout=30m
spring.session.store-type=none

# ========== Actuator Configuration ==========
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

